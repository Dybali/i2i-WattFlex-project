services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voltwise}
      POSTGRES_USER: ${POSTGRES_USER:-voltwise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voltwise}
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data", "./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro"]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"], interval: 5s, timeout: 3s, retries: 20}
  kafka:
    image: apache/kafka:3.9.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck: {test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"], interval: 8s, timeout: 5s, retries: 20}
  ignite:
    image: apacheignite/ignite:2.16.0
    environment: {IGNITE_QUIET: "false"}
  core:
    build: {context: ., dockerfile: voltwise-core/Dockerfile}
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-voltwise}
      DB_USER: ${POSTGRES_USER:-voltwise}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-voltwise}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      IGNITE_ADDRESSES: ignite:10800
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ALERT_FROM: ${ALERT_FROM:-alerts@voltwise.local}
      DEMO_DATA_ENABLED: ${DEMO_DATA_ENABLED:-true}
    ports: ["8080:8080"]
    depends_on: {postgres: {condition: service_healthy}, kafka: {condition: service_healthy}, ignite: {condition: service_started}}
  sensors:
    build: {context: ., dockerfile: voltwise-sensors/Dockerfile}
    environment: {KAFKA_BOOTSTRAP_SERVERS: kafka:9092, SENSOR_INTERVAL_MS: 3000}
    depends_on: {kafka: {condition: service_healthy}}
  web:
    build: {context: ./voltwise-web}
    ports: ["3000:80"]
    depends_on: [core]
volumes: {postgres-data: {}}
